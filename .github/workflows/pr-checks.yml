name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: uv sync
      - run: uv run pytest

  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version tag does not exist
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="v$VERSION"
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "::error::Tag $TAG already exists. Bump the version in pyproject.toml before merging."
            exit 1
          fi
          echo "Version $TAG is available."
